server.port=8083

spring.data.mongodb.uri=${MONGO_URI}

#email configuration
resend.api.key=${API_KEY}
resend.api.url=https://api.resend.com/emails
resend.enabled=${RESEND_ENABLED:true}
resend.mail.from=onboarding@resend.dev
resend.test.email=${TEST_RECIPIENT_EMAIL:}

#application information
app.base.url=http://localhost:8083


#Cloudinary information
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_APIKEY}
cloudinary.api-secret=${CLOUDINARY_APISECRET}

#jwt configuration
jwt.secret=your-secret-key-here-change-this-in-production-with-more-secure-and-complicated-key
jwt.expiration=604800000